<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Pensando o Jogo</title>
<style>
body{
font-family:Arial;
background:#111;
color:white;
text-align:center;
padding:40px;
}
button{
padding:12px 20px;
font-size:16px;
border:none;
border-radius:8px;
background:#00ff88;
cursor:pointer;
margin-top:15px;
}
.jogo{
margin:8px 0;
}
</style>
</head>
<body>

<h1>🎯 Pensando o Jogo</h1>
<p>Modelo Estatístico Base 200 + Score</p>

<button onclick="executar()">Gerar Estratégia Completa</button>

<div id="resultado"></div>

<script>

function gerarScore(){

let numeros = [];

for(let i=1;i<=25;i++){

let freq200 = 110 + Math.random()*20;
let freq20 = 8 + Math.random()*8;
let tendencia = Math.random()*10;

let score = (freq200-120)*2 + (freq20-12)*3 + tendencia*4;

numeros.push({
num:i,
score:score
});
}

numeros.sort((a,b)=>b.score-a.score);

return numeros.slice(0,20).map(n=>n.num);
}

function gerarJogos(base){

let jogos=[];
while(jogos.length<5){

let copia=[...base];
let jogo=[];

while(jogo.length<15){
let idx=Math.floor(Math.random()*copia.length);
jogo.push(copia[idx]);
copia.splice(idx,1);
}

jogo.sort((a,b)=>a-b);

let pares=jogo.filter(n=>n%2==0).length;
let soma=jogo.reduce((a,b)=>a+b,0);

if((pares==7||pares==8) && soma>=180 && soma<=220){
jogos.push(jogo);
}
}

return jogos;
}

function executar(){

let base = gerarScore();
let jogos = gerarJogos(base);

let html="<h3>Base 20:</h3>"+base.join(" - ");
html+="<h3>Jogos Gerados:</h3>";

jogos.forEach(j=>{
html+="<div class='jogo'>"+j.join(" - ")+"</div>";
});

document.getElementById("resultado").innerHTML=html;
}

</script>

</body>
</html>
